services:
  cassandra-1:
    image: cassandra:latest
    container_name: cassandra-1
    restart: unless-stopped
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: training-lab
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_DC: datacenter1
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 200M
    volumes:
      - cassandra-1-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9042' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  cassandra-2:
    image: cassandra:latest
    container_name: cassandra-2
    restart: unless-stopped
    environment:
      CASSANDRA_CLUSTER_NAME: training-lab
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_DC: datacenter1
      CASSANDRA_SEEDS: cassandra-1
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 200M
    volumes:
      - cassandra-2-data:/var/lib/cassandra
    depends_on:
      cassandra-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9042' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  cassandra-3:
    image: cassandra:latest
    container_name: cassandra-3
    restart: unless-stopped
    environment:
      CASSANDRA_CLUSTER_NAME: training-lab
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_DC: datacenter1
      CASSANDRA_SEEDS: cassandra-1
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 200M
    volumes:
      - cassandra-3-data:/var/lib/cassandra
    depends_on:
      cassandra-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9042' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

volumes:
  cassandra-1-data:
  cassandra-2-data:
  cassandra-3-data:
